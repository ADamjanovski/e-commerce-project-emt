springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.application.name=${SPRING_APPLICATION_NAME:backend}

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent}

# Cache Configuration
spring.cache.type=${SPRING_CACHE_TYPE:redis}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:864000000}
jwt.header=${JWT_HEADER:Authorization}
jwt.prefix=${JWT_PREFIX:Bearer }
